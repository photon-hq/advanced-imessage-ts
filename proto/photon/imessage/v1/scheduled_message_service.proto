syntax = "proto3";
package photon.imessage.v1;

option swift_prefix = "PIMsg_";

import "google/protobuf/timestamp.proto";
import "photon/imessage/v1/common.proto";

// ---------------------------------------------------------------------------
// Service
// ---------------------------------------------------------------------------

service ScheduledMessageService {
  rpc CreateScheduledMessage(CreateScheduledMessageRequest) returns (CreateScheduledMessageResponse);
  rpc GetScheduledMessage(GetScheduledMessageRequest) returns (GetScheduledMessageResponse);
  rpc ListScheduledMessages(ListScheduledMessagesRequest) returns (ListScheduledMessagesResponse);
  rpc UpdateScheduledMessage(UpdateScheduledMessageRequest) returns (UpdateScheduledMessageResponse);
  rpc DeleteScheduledMessage(DeleteScheduledMessageRequest) returns (DeleteScheduledMessageResponse);
  rpc DeleteAllScheduledMessages(DeleteAllScheduledMessagesRequest) returns (DeleteAllScheduledMessagesResponse);
  rpc ExecuteDueScheduledMessages(ExecuteDueScheduledMessagesRequest) returns (ExecuteDueScheduledMessagesResponse);
  rpc ExecuteScheduledMessage(ExecuteScheduledMessageRequest) returns (ExecuteScheduledMessageResponse);
  rpc SubscribeScheduleEvents(SubscribeScheduleEventsRequest) returns (stream SubscribeScheduleEventsResponse);
}

// ---------------------------------------------------------------------------
// Types
// ---------------------------------------------------------------------------

enum ScheduledMessageType {
  SCHEDULED_MESSAGE_TYPE_UNSPECIFIED = 0;
  SCHEDULED_MESSAGE_TYPE_SEND_MESSAGE = 1;
}

enum ScheduledMessageStatus {
  SCHEDULED_MESSAGE_STATUS_UNSPECIFIED = 0;
  SCHEDULED_MESSAGE_STATUS_IN_PROGRESS = 1;
  SCHEDULED_MESSAGE_STATUS_COMPLETE = 2;
  SCHEDULED_MESSAGE_STATUS_FAILED = 3;
  SCHEDULED_MESSAGE_STATUS_PENDING = 4;
}

message ScheduledMessage {
  int64 id = 1;
  ScheduledMessageType type = 2;
  bytes payload = 3;
  google.protobuf.Timestamp scheduled_for = 4;
  bytes schedule = 5;
  ScheduledMessageStatus status = 6;
  optional string error_message = 7;
  optional google.protobuf.Timestamp sent_at = 8;
  google.protobuf.Timestamp created_at = 9;
}

// ---------------------------------------------------------------------------
// Request / Response messages
// ---------------------------------------------------------------------------

message CreateScheduledMessageRequest {
  ScheduledMessageType type = 1;
  bytes payload = 2;
  google.protobuf.Timestamp scheduled_for = 3;
  bytes schedule = 4;
}

message CreateScheduledMessageResponse {
  ScheduledMessage scheduled_message = 1;
}

message GetScheduledMessageRequest {
  int64 id = 1;
}

message GetScheduledMessageResponse {
  ScheduledMessage scheduled_message = 1;
}

message ListScheduledMessagesRequest {}

message ListScheduledMessagesResponse {
  repeated ScheduledMessage messages = 1;
}

message UpdateScheduledMessageRequest {
  int64 id = 1;
  ScheduledMessageType type = 2;
  bytes payload = 3;
  google.protobuf.Timestamp scheduled_for = 4;
  bytes schedule = 5;
}

message UpdateScheduledMessageResponse {
  ScheduledMessage scheduled_message = 1;
}

message DeleteScheduledMessageRequest {
  int64 id = 1;
}

message DeleteScheduledMessageResponse {}

message DeleteAllScheduledMessagesRequest {}

message DeleteAllScheduledMessagesResponse {}

message ExecuteDueScheduledMessagesRequest {}

message ExecuteDueScheduledMessagesResponse {
  repeated ScheduledMessage messages = 1;
}

message ExecuteScheduledMessageRequest {
  int64 id = 1;
}

message ExecuteScheduledMessageResponse {
  ScheduledMessage scheduled_message = 1;
}

// ---------------------------------------------------------------------------
// Event streaming
// ---------------------------------------------------------------------------

message SubscribeScheduleEventsRequest {}

message SubscribeScheduleEventsResponse {
  google.protobuf.Timestamp timestamp = 1;
  oneof payload {
    ScheduledMessageEvent scheduled_message_changed = 10;
    Heartbeat heartbeat = 99;
  }
}

message ScheduledMessageEvent {
  ScheduledMessage scheduled_message = 1;
  string action = 2;
}
