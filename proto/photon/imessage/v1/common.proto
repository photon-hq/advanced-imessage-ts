syntax = "proto3";
package photon.imessage.v1;

option swift_prefix = "PIMsg_";

// Pagination response metadata.
message PaginatedMeta {
  int32 total = 1;
  int32 offset = 2;
  int32 limit = 3;
}

// Keepalive signal for streaming RPCs behind proxies (e.g. Cloudflare Tunnel).
// Clients should silently discard these.
message Heartbeat {}

// Sort direction for list queries.
enum SortDirection {
  SORT_DIRECTION_UNSPECIFIED = 0;
  SORT_DIRECTION_DESCENDING = 1;
  SORT_DIRECTION_ASCENDING = 2;
}

// Opaque cursor for resumable event streams.
// Clients must treat the value as opaque and pass it back verbatim.
message StreamCursor {
  string value = 1;
}
